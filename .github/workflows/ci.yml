name: Cucumber-Selenium Automation CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  JAVA_VERSION: 21

jobs:

  # ==========================================
  # 1️⃣ BUILD STAGE
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest

    outputs:
      cache-key: ${{ steps.cache-maven.outputs.cache-hit }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build
        run: mvn -B clean compile

  # ==========================================
  # 2️⃣ TEST STAGE
  # ==========================================
  test:
    name: Test (Cucumber)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK (cached)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Tests
        run: mvn clean test -Pheadless-chrome,qa

      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: |
            target/cucumber-reports/**
          if-no-files-found: ignore

  # ==========================================
  # 3️⃣ REPORT STAGE
  # ==========================================
  report:
    name: Reports
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Detect Feature File Changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            features:
              - 'src/test/resources/features/**/*.feature'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Generate Feature Coverage
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        run: |
          mkdir -p artifacts
          python scripts/test-coverage-report/generate_coverage.py

      - name: Upload Feature Coverage Artifacts
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: feature-coverage-report
          path: artifacts/

      - name: Comment PR with Coverage
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/test-coverage-report/post_feature_coverage_comment.py

  # ==========================================
  # 4️⃣ DEPLOY STAGE
  # ==========================================
  deploy:
    name: Deploy Feature Coverage to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3️⃣ Install dependencies
      - name: Install Python dependencies
        run: pip install requests

      # 4️⃣ Generate Feature Coverage dynamically
      - name: Generate Feature Coverage
        run: |
          mkdir -p artifacts
          python scripts/test-coverage-report/generate_coverage.py

      # 5️⃣ Prepare folder for GitHub Pages
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p pages
          # Copy generated HTML to pages folder as index.html
          cp artifacts/feature-coverage.html pages/index.html
          # Optional: copy other resources if needed
          cp artifacts/feature-coverage.md pages/feature-coverage.md || true

      # 6️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages