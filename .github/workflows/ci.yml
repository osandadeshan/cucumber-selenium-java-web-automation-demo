name: Cucumber-Selenium Automation CI

on:
  pull_request:        # ✅ Triggers on ALL PRs — build & test always run
  push:
    branches:
      - master

env:
  JAVA_VERSION: 21

jobs:

  # ==========================================
  # 1️⃣ BUILD STAGE
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build
        run: mvn -B clean compile

  # ==========================================
  # 2️⃣ TEST STAGE
  # ==========================================
  test:
    name: Test (Cucumber)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK (cached)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Tests
        run: mvn clean test -Pheadless-chrome,qa

      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports/**
          if-no-files-found: ignore

  # ==========================================
  # 3️⃣ REPORT STAGE
  # ==========================================
  report:
    name: Reports
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Always detect feature changes — works for both PR and push events
      - name: Detect Feature File Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            features:
              - 'src/test/resources/features/**/*.feature'

      - name: Set up Python
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        run: pip install requests

      - name: Generate Feature Coverage
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        run: |
          mkdir -p artifacts
          python scripts/test-coverage-report/generate_coverage.py

      - name: Upload Feature Coverage Artifacts
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: feature-coverage-report
          path: artifacts/

      - name: Comment PR with Coverage
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/test-coverage-report/post_feature_coverage_comment.py

      - name: Skip notice
        if: |
          github.event_name == 'pull_request' &&
          steps.changes.outputs.features == 'false'
        run: echo "⏭️  No feature file changes detected — skipping coverage report and PR comment."

  # ==========================================
  # 4️⃣ DEPLOY STAGE
  # ==========================================
  deploy:
    name: Deploy Feature Coverage to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0    # needed by dorny/paths-filter to diff against previous commit

      # Detect whether any feature files were part of this merge
      - name: Detect Feature File Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            features:
              - 'src/test/resources/features/**/*.feature'

      - name: Set up Python
        if: steps.changes.outputs.features == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.changes.outputs.features == 'true'
        run: pip install requests

      - name: Generate Feature Coverage
        if: steps.changes.outputs.features == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p artifacts
          python scripts/test-coverage-report/generate_coverage.py

      - name: Verify coverage report was generated
        if: steps.changes.outputs.features == 'true'
        run: |
          if [ ! -f artifacts/feature-coverage.html ]; then
            echo "❌ artifacts/feature-coverage.html was not generated. Aborting deploy."
            exit 1
          fi
          echo "✅ feature-coverage.html found ($(wc -c < artifacts/feature-coverage.html) bytes)"

      - name: Prepare GitHub Pages content
        if: steps.changes.outputs.features == 'true'
        run: |
          mkdir -p pages
          cp artifacts/feature-coverage.html pages/index.html

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.features == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "chore: update feature coverage report [skip ci]"

      - name: Skip notice
        if: steps.changes.outputs.features == 'false'
        run: echo "⏭️  No feature file changes detected — skipping GitHub Pages deploy."